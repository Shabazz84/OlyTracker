<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>OlyTracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body,#root{height:100%;width:100%}
:root{--bg:#0a0a0a;--bg1:#111;--bg2:#161616;--bg3:#1c1c1c;--border:#222;--border2:#2a2a2a;--text:#e2e2e2;--text2:#888;--text3:#444;--gold:#d4a843;--red:#c94f3a;--blue:#4a90d9;--green:#5a9e45;--purple:#8b5cf6;}
body{background:#0a0a0a;color:#e2e2e2;font-family:'DM Sans',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0a0a}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
input,select,textarea{font-family:'DM Sans',sans-serif}
input:focus,select:focus,textarea:focus{outline:none!important;border-color:#d4a843!important}
.fade{animation:fadeIn 0.25s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.tab-scroll::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script>
const storage={
  get:async(key)=>{try{const val=localStorage.getItem(key);return val!==null?{value:val}:null;}catch(e){return null;}},
  set:async(key,value)=>{try{const v=typeof value==='string'?value:JSON.stringify(value);localStorage.setItem(key,v);return{value:v};}catch(e){return null;}},
  delete:async(key)=>{try{localStorage.removeItem(key);return{deleted:true};}catch(e){return null;}},
  list:async(prefix)=>{try{const keys=Object.keys(localStorage).filter(k=>!prefix||k.startsWith(prefix));return{keys};}catch(e){return{keys:[]};}}
};
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>window.__CLAUDE_KEY=undefined;window.__SUPABASE_URL=undefined;window.__SUPABASE_KEY=undefined;</script>
<script src="key.js"></script>
<script>
// ── Supabase sync ─────────────────────────────────────────────────────────────
const sbSync = (() => {
  const url = window.__SUPABASE_URL;
  const key = window.__SUPABASE_KEY;
  const noop = () => {};
  const noopAsync = async () => null;

  if (!url || !key || url === 'undefined' || key === 'undefined') {
    return { ready: false, upsertSession: noop, upsertSets: noop, upsertReview: noop, deleteSession: noop, pullAll: noopAsync };
  }

  const sb = window.supabase.createClient(url, key);

  async function upsertSession(id, e) {
    try {
      await sb.from('sessions').upsert({
        id, week: e.week,
        day_name: e.dayName || null, day_label: e.dayLabel || null,
        date: e.date || null, notes: e.notes || null, weights: e.weights || null,
        back_pain: e.backPain || null, night_shift: !!e.nightShift,
        technique_feel: e.techniqueFeel || null, energy_level: e.energyLevel || null,
        focus_next: e.focusNext || null, rating: e.rating || null,
      });
    } catch(err) { console.warn('sbSync.upsertSession:', err); }
  }

  async function upsertSets(lsKey, setsArr) {
    try {
      const m = lsKey.match(/^sets_(w(\d+)_(d\d+))_(.+)$/);
      if (!m) { console.warn('sbSync.upsertSets: bad key format:', lsKey); return; }
      const week = parseInt(m[2]), dayId = m[3], exId = m[4];
      const rows = setsArr.map((s, i) => ({
        id: `${lsKey}_${i}`, week, day_id: dayId, exercise_id: exId,
        set_index: i, done: !!s.done, weight: s.weight ?? null,
      }));
      await sb.from('sets').upsert(rows);
    } catch(err) { console.warn('sbSync.upsertSets:', err); }
  }

  async function upsertReview(week, r) {
    try {
      await sb.from('reviews').upsert({
        week, rating: r.rating || null, energy_trend: r.energyTrend || null,
        injuries: r.injuries || [], general_notes: r.generalNotes || null,
        ai_response: r.ai || null, confirmed: !!r.confirmed, days: r.days || {},
      });
    } catch(err) { console.warn('sbSync.upsertReview:', err); }
  }

  async function deleteSession(id) {
    try { await sb.from('sessions').delete().eq('id', id); }
    catch(err) { console.warn('sbSync.deleteSession:', err); }
  }

  async function pullAll() {
    try {
      const [sess, sets, revs] = await Promise.all([
        sb.from('sessions').select('*'),
        sb.from('sets').select('*'),
        sb.from('reviews').select('*'),
      ]);
      return { sessions: sess.data || [], sets: sets.data || [], reviews: revs.data || [] };
    } catch(err) {
      console.warn('sbSync.pullAll:', err);
      return { sessions: [], sets: [], reviews: [] };
    }
  }

  return { ready: true, upsertSession, upsertSets, upsertReview, deleteSession, pullAll };
})();
</script>
<script src="app.js"></script>
</body>
</html>
