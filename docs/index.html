        <div style={{background:"var(--bg2)",borderRadius:8,padding:"14px 16px",
          border:"1px solid var(--border)"}}>
          <div style={{fontSize:10,color:"var(--text2)",lineHeight:1.7,marginBottom:10}}>
            Block {blockNum} sessions are defined at week-level resolution.
            Full per-day tables are added at the start of each block.
          </div>
          <div style={{fontSize:10,color:"var(--text3)"}}>
            Reference: <span style={{color:"var(--text2)",fontFamily:"'DM Mono',monospace"}}>
              summaries/complete_program.md → Part 3
            </span>
          </div>
        </div>
      )}
      {isB1 && viewWeek <= currentWeek && (
        <WeekReviewForm
          week={viewWeek}
          weekData={weekData}
          isSummer={isSummer}
          onSaved={()=>setReviewVersion(v=>v+1)}
        />
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function OlyTracker() {
  const [tab,setTab]         = useState("program");
  const [dayIdx,setDayIdx]   = useState(0);
  const [week,setWeek]       = useState(1);
  const [isSummer,setIsSummer] = useState(true);
  const [prs,setPrs]         = useState({});
  const [logs,setLogs]       = useState({});
  const [loading,setLoading] = useState(true);
  const [toast,setToast]     = useState(null);
  const [newPR,setNewPR]     = useState({lift:"Back Squat",weight:"",reps:"1"});
  const [logForm,setLogForm] = useState(()=>({dayId:"d1",date:new Date().toISOString().slice(0,10),notes:"",weights:"",backPain:"0",nightShift:false,techniqueFeel:"",energyLevel:"",focusNext:"",rating:""}));
  const [logModal,setLogModal] = useState(false);
  const [logEditKey,setLogEditKey] = useState(null);
  const [prTab,setPrTab]     = useState("key");
  const [progTab,setProgTab] = useState("program");
  const PROGRAM_START_MS = new Date("2026-05-20").getTime();
  const currentWeek = Math.max(1, Math.min(28, Math.floor((Date.now() - PROGRAM_START_MS) / (7*24*3600*1000)) + 1));
  const [progViewWeek, setProgViewWeek] = useState(currentWeek);
  const [suppHistory,setSuppHistory] = useState({});
  const [suppNotes,setSuppNotes]     = useState("");
  const TODAY = new Date().toISOString().slice(0,10);
  const suppChecked = suppHistory[TODAY] || {};
  const [sessionProgress,setSessionProgress] = useState({});
  const [gistCfg,setGistCfg] = useState(()=>{try{return JSON.parse(localStorage.getItem("oly_gist")||"null")||{token:"",id:"",lastSync:null};}catch{return{token:"",id:"",lastSync:null};}});
  const [syncStatus,setSyncStatus] = useState("idle");
  const [gistToken,setGistToken] = useState("");
  const [setsVersion,setSetsVersion] = useState(0);
  const [syncRevision,setSyncRevision] = useState(0);

  const DAYS = isSummer ? DAYS_SUMMER : DAYS_SCHOOL;
  const phase = week<=3?0:1;
  const day = DAYS[Math.min(dayIdx, DAYS.length-1)];

  // Reset progress tracking when day changes
  useEffect(() => { setSessionProgress({}); }, [dayIdx, week]);

  useEffect(()=>{load();},[]);

  async function load() {
    try {
      const [p,l,w,s] = await Promise.allSettled([
        storage.get("oly_prs"),
        storage.get("oly_logs"),
        storage.get("oly_week"),
        storage.get("oly_summer"),
      ]);
      if(p.status==="fulfilled"&&p.value){
        const raw=JSON.parse(p.value.value);
        const migrated={};
        Object.entries(raw).forEach(([lift,entry])=>{
          migrated[lift]=entry.history?entry:{...entry,history:entry.weight!=null?[{weight:entry.weight,date:entry.date??'',reps:entry.reps??1}]:[]};
        });
        setPrs(migrated);
      }else{
        const seeded={};
        Object.entries(SEED_PRS).forEach(([lift,entry])=>{
          seeded[lift]={...entry,history:[{weight:entry.weight,date:entry.date,reps:entry.reps}]};
        });
        setPrs(seeded);await storage.set("oly_prs",JSON.stringify(seeded));
      }
      if(l.status==="fulfilled"&&l.value) setLogs(JSON.parse(l.value.value));
      if(w.status==="fulfilled"&&w.value) setWeek(JSON.parse(w.value.value));
      if(s.status==="fulfilled"&&s.value) setIsSummer(JSON.parse(s.value.value));
      // Load supplements
      const [sc, sn] = await Promise.allSettled([
        storage.get("oly_supp_history"),
        storage.get("oly_supp_notes"),
      ]);
      if(sc.status==="fulfilled"&&sc.value) setSuppHistory(JSON.parse(sc.value.value)||{});
      if(sn.status==="fulfilled"&&sn.value) setSuppNotes(sn.value.value);
      // Pull from Supabase on startup (takes priority over localStorage)
      if (sbSync.ready) {
        try {
          const remote = await sbSync.pullAll();
          if (remote.sessions.length > 0 || remote.sets.length > 0 || remote.reviews.length > 0) {
            await applySupabaseData(remote);
          }
        } catch { /* silent — continue with localStorage data */ }
      }
      // Pull from Gist on startup (takes priority over localStorage)
      const gcfg=JSON.parse(localStorage.getItem("oly_gist")||"null");
      if(gcfg?.token&&gcfg?.id){
        try{
          const remote=await gist.read(gcfg.token,gcfg.id);
          if(remote.version===1) await applyRemoteData(remote);
          const updated={...gcfg,lastSync:new Date().toISOString()};
          setGistCfg(updated);
          localStorage.setItem("oly_gist",JSON.stringify(updated));
          setSyncStatus("ok");
        }catch{setSyncStatus("error");}
      }
    } catch{setPrs(SEED_PRS);}
    setLoading(false);
  }

  // Auto-push to Gist 3s after any data change
  useEffect(()=>{
    if(loading) return;
    const cfg=JSON.parse(localStorage.getItem("oly_gist")||"null");
    if(!cfg?.token||!cfg?.id) return;
    const timer=setTimeout(async()=>{
      setSyncStatus("syncing");
      try{
        const setsData={};
        Object.keys(localStorage).filter(k=>k.startsWith("sets_")).forEach(k=>{setsData[k]=localStorage.getItem(k);});
        const data={version:1,oly_prs:prs,oly_logs:logs,oly_week:week,oly_summer:isSummer,oly_supp_history:suppHistory,oly_supp_notes:suppNotes,sets:setsData};
        await gist.write(cfg.token,cfg.id,data);
        const updated={...cfg,lastSync:new Date().toISOString()};
        setGistCfg(updated);
        localStorage.setItem("oly_gist",JSON.stringify(updated));
        setSyncStatus("ok");
      }catch{setSyncStatus("error");}
    },3000);
    return()=>clearTimeout(timer);
  },[prs,logs,week,isSummer,suppHistory,suppNotes,loading,setsVersion]);

  async function applySupabaseData(remote) {
    if (remote.sessions.length > 0) {
      const existing = JSON.parse(localStorage.getItem('oly_logs') || '{}') || {};
      const logsObj = { ...existing };
      remote.sessions.forEach(s => {
        logsObj[s.id] = {
          week: s.week, dayName: s.day_name, dayLabel: s.day_label,
          date: s.date, notes: s.notes || '', weights: s.weights || '',
          backPain: s.back_pain || '0', nightShift: !!s.night_shift,
          techniqueFeel: s.technique_feel || '', energyLevel: s.energy_level || '',
          focusNext: s.focus_next || '', rating: s.rating || '',
        };
      });
      setLogs(logsObj);
      await storage.set('oly_logs', JSON.stringify(logsObj));
    }
    if (remote.sets.length > 0) {
      const setsMap = {};
      remote.sets.forEach(s => {
        const k = `sets_w${s.week}_${s.day_id}_${s.exercise_name}`;
        if (!setsMap[k]) setsMap[k] = [];
        setsMap[k][s.set_index] = { done: s.done, weight: s.weight };
      });
      Object.entries(setsMap).forEach(([k, arr]) => {
        localStorage.setItem(k, JSON.stringify(arr.filter(Boolean)));
      });
      setSyncRevision(r => r + 1);
    }
    if (remote.reviews.length > 0) {
      const existing = JSON.parse(localStorage.getItem('oly_reviews') || '{}') || {};
      const revObj = { ...existing };
      remote.reviews.forEach(r => {
        revObj[r.week] = {
          rating: r.rating, energyTrend: r.energy_trend,
          injuries: r.injuries || [], generalNotes: r.general_notes || '',
          ai: r.ai_response || null, confirmed: r.confirmed, days: r.days || {},
        };
      });
      localStorage.setItem('oly_reviews', JSON.stringify(revObj));
    }
  }

  async function applyRemoteData(data){
    if(data.oly_prs){setPrs(data.oly_prs);await storage.set("oly_prs",JSON.stringify(data.oly_prs));}
    if(data.oly_logs){setLogs(data.oly_logs);await storage.set("oly_logs",JSON.stringify(data.oly_logs));}
    if(data.oly_week!==undefined){setWeek(data.oly_week);await storage.set("oly_week",JSON.stringify(data.oly_week));}
    if(data.oly_summer!==undefined){setIsSummer(data.oly_summer);await storage.set("oly_summer",JSON.stringify(data.oly_summer));}
    if(data.oly_supp_history){setSuppHistory(data.oly_supp_history);await storage.set("oly_supp_history",JSON.stringify(data.oly_supp_history));}
    if(data.oly_supp_notes!==undefined){setSuppNotes(data.oly_supp_notes);await storage.set("oly_supp_notes",data.oly_supp_notes);}
    if(data.sets){
      const count=Object.keys(data.sets).length;
      Object.entries(data.sets).forEach(([k,v])=>localStorage.setItem(k,v));
      setSyncRevision(r=>r+1);
      showToast(`Pulled ${count} set records`);
    } else {
      showToast("Pulled — no set data in Gist");
    }
  }

  async function connectGist(){
    if(!gistToken.trim()) return;
    setSyncStatus("syncing");
    try{
      let id=await gist.find(gistToken);
      if(id){
        const remote=await gist.read(gistToken,id);
        if(remote.version===1) await applyRemoteData(remote);
      } else {
        const data={version:1,oly_prs:prs,oly_logs:logs,oly_week:week,oly_summer:isSummer,oly_supp_history:suppHistory,oly_supp_notes:suppNotes};
        id=await gist.create(gistToken,data);
      }
      const cfg={token:gistToken,id,lastSync:new Date().toISOString()};
      setGistCfg(cfg);
      localStorage.setItem("oly_gist",JSON.stringify(cfg));
      setSyncStatus("ok");
      showToast("✓ GitHub sync connected");
    }catch{
      setSyncStatus("error");
      showToast("❌ Sync failed — check your token");
    }
  }

  async function toggleSupp(id) {
    const todayEntry = {...(suppHistory[TODAY]||{}), [id]: !suppChecked[id]};
    const updated = {...suppHistory, [TODAY]: todayEntry};
    setSuppHistory(updated);
    try{await storage.set("oly_supp_history",JSON.stringify(updated));}catch{}
  }

  async function saveSuppNotes(val) {
    setSuppNotes(val);
    try{await storage.set("oly_supp_notes", val);}catch{}
  }

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),2500);}

  async function saveWeek(w){setWeek(w);try{await storage.set("oly_week",JSON.stringify(w));}catch{}}
  async function toggleSummer(v){
    setIsSummer(v);
    if(dayIdx>=4&&!v) setDayIdx(0);
    try{await storage.set("oly_summer",JSON.stringify(v));}catch{}
  }

  async function handleAddPR(){
    if(!newPR.weight||isNaN(newPR.weight)) return;
    const existing=prs[newPR.lift];
    const nw=parseFloat(newPR.weight);
    const nr=parseInt(newPR.reps)||1;
    const today=new Date().toISOString().slice(0,10);
    const isNew=!existing||nw>existing.weight;
    let entry;
    if(isNew){
      const history=[...(existing?.history||[]),{weight:nw,date:today,reps:nr}];
      entry={weight:nw,date:today,reps:nr,history};
    }else{
      entry={...existing,history:existing.history||[]};
    }
    const updated={...prs,[newPR.lift]:entry};
    setPrs(updated);
    try{await storage.set("oly_prs",JSON.stringify(updated));}catch{}
    setNewPR(p=>({...p,weight:"",reps:"1"}));
    showToast(isNew?`🏆 NEW PR — ${newPR.lift}: ${nw} kg!`:`Already at ${existing?.weight} kg — no PR logged`);
  }

  async function handleLog(){
    if(!logForm.notes&&!logForm.weights&&!logForm.rating) return;
    const d=DAYS.find(d=>d.id===logForm.dayId);
    const key = logEditKey || `${Date.now()}`;
    const updated={...logs,[key]:{
      date:logForm.date||new Date().toISOString().slice(0,10),
      dayName:d?.name||logForm.dayId,
      dayLabel:d?.label||"",
      week,notes:logForm.notes,weights:logForm.weights,
      backPain:logForm.backPain,nightShift:logForm.nightShift,
      techniqueFeel:logForm.techniqueFeel,
      energyLevel:logForm.energyLevel,
      focusNext:logForm.focusNext,
      rating:logForm.rating,
    }};
    setLogs(updated);
    try{await storage.set("oly_logs",JSON.stringify(updated));}catch{}
    sbSync.upsertSession(key, updated[key]);
    setLogForm(f=>({...f,date:new Date().toISOString().slice(0,10),notes:"",weights:"",backPain:"0",nightShift:false,techniqueFeel:"",energyLevel:"",focusNext:"",rating:""}));
    setLogEditKey(null);
    setLogModal(false);
    showToast("Session logged ✓");
  }

  const logEntries=Object.entries(logs).sort(([,a],[,b])=>b.date.localeCompare(a.date));

  async function deleteLog(key){
    const updated={...logs};
    delete updated[key];
    setLogs(updated);
    try{await storage.set("oly_logs",JSON.stringify(updated));}catch{}
    sbSync.deleteSession(key);
  }
  const isLogged=(w)=>Object.values(logs).some(l=>l.week===w);

  const KEY_PRS=[["Back Squat","🏋️"],["Clean","💪"],["Clean & Jerk","⚡"],["Snatch (Floor)","🎯"],
    ["Hang Power Snatch","🔥"],["Push Jerk","🎯"],["Overhead Squat","📐"],["Clean Pull","💥"],
    ["Jerk from Rack","🎯"],["Sots Press","🧘"]];

  const sleepMeta = day ? SLEEP[day.sleep] : null;

  const isDayLogged = (dayId) => Object.values(logs).some(l => {
    const m = l.dayLabel && l.dayLabel.match(/(\d+)/);
    return l.week === week && m && `d${m[1]}` === dayId;
  });
  const thisDayLogged = day ? isDayLogged(day.id) : false;

  if(loading) return(
    <div style={{background:"var(--bg)",height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"var(--text3)",letterSpacing:5}}>LOADING</span>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",
          background:"var(--gold)",color:"#000",padding:"10px 20px",borderRadius:6,
          fontWeight:600,fontSize:13,zIndex:999,whiteSpace:"nowrap",
          boxShadow:"0 4px 20px rgba(0,0,0,0.5)"}}>
          {toast}
        </div>
      )}

      {/* Header */}
      <div style={{background:"var(--bg1)",borderBottom:"1px solid var(--border)",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:700,margin:"0 auto",padding:"14px 16px 0"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:2,lineHeight:1}}>
                OLY<span style={{color:"var(--gold)"}}>TRACKER</span>
              </div>
              <div style={{fontSize:9,color:"var(--text3)",letterSpacing:2.5,fontFamily:"'DM Mono',monospace",marginTop:3}}>
                BLOCK 1 · HYPERTROPHY FOUNDATION · 6 WEEKS
              </div>
              <div style={{fontSize:8,color:"var(--text3)",letterSpacing:1.5,fontFamily:"'DM Mono',monospace",marginTop:2,opacity:0.6}}>
                PROGRAM v2.6 · 2026-05-25
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:"var(--gold)",lineHeight:1}}>WK {week}</div>
                <div style={{fontSize:9,color:"var(--text3)",letterSpacing:2,fontFamily:"'DM Mono',monospace",marginTop:2}}>
                  PHASE {phase+1} · {phase===0?"BASE BUILD":"LOAD UP"}
                </div>
              </div>
              {/* Summer toggle */}
              <div style={{display:"flex",gap:1,background:"var(--bg2)",borderRadius:5,border:"1px solid var(--border)",overflow:"hidden"}}>
                <button onClick={()=>toggleSummer(true)} style={{
                  padding:"4px 10px",fontSize:9,fontFamily:"'DM Mono',monospace",fontWeight:600,letterSpacing:1,
                  border:"none",cursor:"pointer",background:isSummer?"var(--gold)":"transparent",
                  color:isSummer?"#000":"var(--text3)",transition:"all 0.15s",
                }}>☀️ SUMMER</button>
                <button onClick={()=>toggleSummer(false)} style={{
                  padding:"4px 10px",fontSize:9,fontFamily:"'DM Mono',monospace",fontWeight:600,letterSpacing:1,
                  border:"none",cursor:"pointer",background:!isSummer?"var(--gold)":"transparent",
                  color:!isSummer?"#000":"var(--text3)",transition:"all 0.15s",
                }}>🎒 SCHOOL</button>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:0,overflowX:"auto",WebkitOverflowScrolling:"touch",
            scrollbarWidth:"none",msOverflowStyle:"none"}}>
            {[["program","PROGRAM"],["mobility","MOBILITY"],["supps","SUPPS"],["log","LOG"],["prs","PRs"],["reports","REPORTS"],["system","SYSTEM"]].map(([id,lbl])=>(
              <button key={id} onClick={()=>setTab(id)} style={{
                padding:"9px 12px",cursor:"pointer",fontSize:10,fontWeight:600,letterSpacing:1.5,
                border:"none",background:"transparent",fontFamily:"'DM Mono',monospace",
                color:tab===id?"var(--gold)":"var(--text3)",
                borderBottom:tab===id?"2px solid var(--gold)":"2px solid transparent",
                transition:"all 0.15s",whiteSpace:"nowrap",flexShrink:0,
              }}>{lbl}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px 80px"}}>

        {/* ═══ PROGRAM ═══ */}
        {tab==="program" && (
          <div className="fade">

            {/* Program / Schedule sub-tabs */}
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              <Btn small ghost={progTab!=="program"} active={progTab==="program"} onClick={()=>setProgTab("program")}>TRAINING DAYS</Btn>
              <Btn small ghost={progTab!=="schedule"} active={progTab==="schedule"} onClick={()=>setProgTab("schedule")}>SCHEDULE</Btn>
              <Btn small ghost={progTab!=="weekplan"} active={progTab==="weekplan"} onClick={()=>setProgTab("weekplan")}>WEEK PLAN</Btn>
            </div>

            {progTab==="schedule" && <ScheduleView />}
            {progTab==="weekplan" && (
              <ProgramWeekView
                viewWeek={progViewWeek}
                onWeekChange={setProgViewWeek}
                currentWeek={currentWeek}
                isSummer={isSummer}
              />
            )}

            {progTab==="program" && <>
              {/* Mode banner */}
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16,
                background:"var(--bg2)",borderRadius:8,padding:"10px 14px",
                border:`1px solid ${isSummer?"#d4a84344":"#4a90d944"}`}}>
                <span style={{fontSize:18}}>{isSummer?"☀️":"🎒"}</span>
                <div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:0.5,
                    color:isSummer?"var(--gold)":"var(--blue)"}}>
                    {isSummer?"SUMMER MODE — 5 DAYS/WEEK":"SCHOOL TERM — 4 DAYS/WEEK"}
                  </div>
                  <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>
                    {isSummer?"Mon/Tue/Wed/Thu/Sat · Extended sleep on shift days (8:30am→2pm)":"Mon/Tue/Wed/Thu · Sat drops to ~3.5h sleep when school resumes"}
                  </div>
                </div>
              </div>

              {/* Week selector */}
              <Label>SELECT WEEK</Label>
              <div style={{display:"flex",gap:7,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
                {[1,2,3,4,5,6].map(w=>{
                  const active=w===week,logged=isLogged(w);
                  return(
                    <button key={w} onClick={()=>saveWeek(w)} style={{
                      width:44,height:44,borderRadius:6,cursor:"pointer",
                      fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,transition:"all 0.15s",
                      background:active?"var(--gold)":logged?"rgba(90,158,69,0.1)":"var(--bg2)",
                      color:active?"#000":logged?"var(--green)":"var(--text3)",
                      border:active?"none":logged?"1px solid var(--green)":"1px solid var(--border)",
                      boxShadow:active?"0 0 16px rgba(212,168,67,0.3)":"none",
                    }}>{w}</button>
                  );
                })}
                <span style={{fontSize:9,color:"var(--text3)",fontFamily:"'DM Mono',monospace",marginLeft:4}}>
                  PH1: 1–3 · PH2: 4–6
                </span>
              </div>

              {/* Phase banner */}
              <div style={{background:"var(--bg2)",borderRadius:8,padding:"12px 16px",marginBottom:20,
                border:`1px solid ${phase===0?"#4a90d944":"#d4a84344"}`,
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:21,letterSpacing:0.5,
                    color:phase===0?"var(--blue)":"var(--gold)"}}>
                    {phase===0?"PHASE 1 — BUILD THE BASE":"PHASE 2 — LOAD THE BASE"}
                  </div>
                  <div style={{fontSize:11,color:"var(--text2)",marginTop:4,lineHeight:1.6}}>
                    {phase===0
                      ?"Technique + hypertrophy. Position over load. Own every rep."
                      :"Add load systematically. Technique breaks → drop 5 kg."}
                  </div>
                </div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:54,color:"var(--bg3)",userSelect:"none"}}>{week}</div>
              </div>

              {/* Day tabs */}
              <div style={{display:"grid",gridTemplateColumns:`repeat(${DAYS.length},1fr)`,gap:6,marginBottom:18}}>
                {DAYS.map((d,i)=>{
                  const active=dayIdx===i;
                  const logged=isDayLogged(d.id);
                  const sl=SLEEP[d.sleep];
                  return(
                    <div key={d.id} onClick={()=>setDayIdx(i)} style={{
                      padding:"8px 4px",borderRadius:8,cursor:"pointer",textAlign:"center",
                      border:`1px solid ${active?d.color:logged?"#5a9e6988":"var(--border)"}`,
                      background:active?d.color+"14":logged?"#5a9e4511":"var(--bg1)",transition:"all 0.15s",
                      position:"relative",
                    }}>
                      {logged&&!active&&(
                        <div style={{position:"absolute",top:3,right:4,fontSize:8,color:"var(--green)",lineHeight:1}}>✓</div>
                      )}
                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:1,
                        color:active?d.color:logged?"var(--green)":"var(--text2)"}}>{d.label}</div>
                      <div style={{fontSize:8,color:active?d.color+"99":logged?"#5a9e6977":"var(--text3)",marginTop:1}}>{d.schedule}</div>
                      <div style={{fontSize:7,color:sl.color,marginTop:2,letterSpacing:0.5}}>{sl.label}</div>
                    </div>
                  );
                })}
              </div>

              {/* Day header */}
              <div style={{marginBottom:14,padding:thisDayLogged?"10px 12px":"0",borderRadius:thisDayLogged?8:0,
                border:thisDayLogged?"1px solid #5a9e6944":"none",
                background:thisDayLogged?"#5a9e450a":"transparent",transition:"all 0.2s"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:8}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:0.3,color:day.color,lineHeight:1.2}}>
                    {day.name}
                  </div>
                  {thisDayLogged&&(
                    <Tag color="var(--green)" bg="rgba(90,158,69,0.15)">LOGGED</Tag>
                  )}
                  {sleepMeta&&(
                    <Tag color={sleepMeta.color} bg={sleepMeta.bg}>{sleepMeta.label}</Tag>
                  )}
                  {day.maxLoad&&(
                    <Tag color="var(--gold)" bg="rgba(212,168,67,0.1)">GO HEAVY TODAY</Tag>
                  )}
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {day.focus.map((f,i)=><Tag key={i} color={day.color} bg={day.color+"15"}>{f}</Tag>)}
                </div>
              </div>

              {/* Phase note */}
              <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:6,
                padding:"9px 12px",marginBottom:14,fontSize:11,color:"var(--text2)"}}>
                {phase===0
                  ?"📐 Phase 1: Tap each exercise for coaching notes and load guidelines. Position before weight."
                  :"⚡ Phase 2: Load increases. Technique breaks → drop 5 kg. Never grind bad reps."}
              </div>

              {/* Session progress bar */}
              {(()=>{
                const totalDone = Object.values(sessionProgress).reduce((a,b)=>a+(b.done||0),0);
                // Calculate total sets from ALL exercises in the day, not just reported ones
                const totalSets = day.exercises.reduce((acc, ex) => {
                  const count = typeof ex.sets === "number" ? ex.sets :
                    ex.sets === "6–8" ? 7 : parseInt(ex.sets) || 3;
                  return acc + count;
                }, 0);
                const pct = totalSets>0 ? Math.round((totalDone/totalSets)*100) : 0;
                const allComplete = pct===100;
                return (
                  <div style={{marginBottom:14,background:"var(--bg2)",borderRadius:8,padding:"10px 14px",
                    border:`1px solid ${allComplete?"#5a9e4444":"var(--border)"}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <span style={{fontSize:9,color:"var(--text2)",fontFamily:"'DM Mono',monospace",letterSpacing:1.5}}>
                        SESSION PROGRESS
                      </span>
                      <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                        <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,
                          color:allComplete?"var(--green)":pct>0?"var(--gold)":"var(--text3)"}}>
                          {pct}%
                        </span>
                        <span style={{fontSize:10,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}}>
                          {totalDone}/{totalSets} sets
                        </span>
                      </div>
                    </div>
                    <div style={{background:"var(--bg3)",borderRadius:20,height:6,overflow:"hidden"}}>
                      <div style={{
                        width:`${pct}%`,height:"100%",borderRadius:20,transition:"width 0.3s",
                        background:allComplete?"var(--green)":pct>50?"var(--gold)":"var(--blue)",
                      }}/>
                    </div>
                    {allComplete&&(
                      <button onClick={()=>{
                        const existingKey=Object.keys(logs).find(k=>{
                          const l=logs[k];
                          const m=l.dayLabel&&l.dayLabel.match(/(\d+)/);
                          return l.week===week&&m&&`d${m[1]}`===day.id;
                        });
                        if(existingKey){
                          const l=logs[existingKey];
                          setLogForm({dayId:day.id,date:l.date||new Date().toISOString().slice(0,10),notes:l.notes||"",weights:l.weights||"",backPain:l.backPain||"0",nightShift:l.nightShift||false,techniqueFeel:l.techniqueFeel||"",energyLevel:l.energyLevel||"",focusNext:l.focusNext||"",rating:l.rating||""});
                          setLogEditKey(existingKey);
                        }else{
                          setLogForm(f=>({...f,dayId:day.id,date:new Date().toISOString().slice(0,10)}));
                          setLogEditKey(null);
                        }
                        setLogModal(true);
                      }}
                        style={{width:"100%",marginTop:8,padding:"8px",borderRadius:6,border:"1px solid var(--green)",
                          background:"#5a9e4511",color:"var(--green)",fontSize:10,fontFamily:"'DM Mono',monospace",
                          letterSpacing:1,cursor:"pointer"}}>
                        ✓ COMPLETE SESSION
                      </button>
                    )}
                  </div>
                );
              })()}

              {/* Exercises */}
              {day.exercises.map((ex,i)=>(
                <ExCard key={`${week}_${day.id}_${ex.name}`} ex={ex} phase={phase} sessionKey={`w${week}_${day.id}`} forceReload={syncRevision} onSetsChange={()=>setSetsVersion(v=>v+1)}
                  onProgress={(name,done,total)=>setSessionProgress(p=>({...p,[name]:{done,total}}))}
                />
              ))}

              {/* Complete session button */}
              <button onClick={()=>{
                const existingKey=Object.keys(logs).find(k=>{
                  const l=logs[k];
                  const m=l.dayLabel&&l.dayLabel.match(/(\d+)/);
                  return l.week===week&&m&&`d${m[1]}`===day.id;
                });
                if(existingKey){
                  const l=logs[existingKey];
                  setLogForm({dayId:day.id,date:l.date||new Date().toISOString().slice(0,10),notes:l.notes||"",weights:l.weights||"",backPain:l.backPain||"0",nightShift:l.nightShift||false,techniqueFeel:l.techniqueFeel||"",energyLevel:l.energyLevel||"",focusNext:l.focusNext||"",rating:l.rating||""});
                  setLogEditKey(existingKey);
                }else{
                  setLogForm(f=>({...f,dayId:day.id,date:new Date().toISOString().slice(0,10)}));
                  setLogEditKey(null);
                }
                setLogModal(true);
              }}
                style={{width:"100%",marginTop:16,marginBottom:4,padding:"13px",borderRadius:8,
                  border:"1px solid var(--gold)",background:"#d4a84311",
                  color:"var(--gold)",fontSize:12,fontFamily:"'DM Mono',monospace",
                  letterSpacing:1,cursor:"pointer"}}>
                COMPLETE SESSION
              </button>

              {/* Back pain protocol */}
              <div style={{marginTop:12,background:"#120808",border:"1px solid #3a1818",borderRadius:8,padding:"12px 14px"}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--red)",letterSpacing:1.5,marginBottom:6}}>
                  ⚠️ BACK PAIN PROTOCOL
                </div>
                <p style={{fontSize:12,color:"#665",lineHeight:1.75}}>
                  Back flares: drop all floor pulls, replace with seated cable rows or T-bar rows.
                  Reduce squat to pain-free depth. Never train through sharp or radiating pain.
                  Technique at 60% is always safe. Log back pain level (0–10) in session notes.
                </p>
              </div>
            </>}
          </div>
        )}

        {/* ═══ MOBILITY ═══ */}
        {tab==="mobility" && <MobilityTab/>}

        {/* ═══ SUPPS ═══ */}
        {tab==="supps" && <SuppsTab checked={suppChecked} history={suppHistory} onToggle={toggleSupp} suppNotes={suppNotes} onNoteChange={saveSuppNotes}/>}

        {/* ═══ LOG ═══ */}
        {tab==="log" && (
          <div className="fade">
            <Label>PAST SESSIONS</Label>
            {logEntries.length===0&&(
              <p style={{color:"var(--text3)",fontSize:13,fontStyle:"italic"}}>No sessions yet. Get under the bar.</p>
            )}
            {logEntries.map(([key,entry],i)=>(
              <Card key={key} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div>
                    {entry.dayLabel&&<div style={{fontSize:9,color:"var(--gold)",fontFamily:"'DM Mono',monospace",letterSpacing:1.5,marginBottom:2}}>{entry.dayLabel}</div>}
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:0.3}}>{entry.dayName}</div>
                    {entry.rating&&<div style={{fontSize:14,marginTop:2}}>{entry.rating}</div>}
                  </div>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:10,color:"var(--gold)",fontFamily:"'DM Mono',monospace"}}>WK {entry.week}</div>
                      <div style={{fontSize:10,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}}>{entry.date}</div>
                    </div>
                    <button onClick={()=>deleteLog(key)} style={{
                      background:"transparent",border:"none",cursor:"pointer",
                      color:"var(--text3)",fontSize:16,padding:"0 2px",lineHeight:1,
                    }} title="Delete log">×</button>
                  </div>
                </div>
                {entry.weights&&<div style={{fontSize:11,color:"var(--gold)",fontFamily:"'DM Mono',monospace",marginBottom:8}}>{entry.weights}</div>}
                <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                  {entry.techniqueFeel&&<span style={{fontSize:10,background:"var(--bg2)",color:"var(--text2)",borderRadius:4,padding:"2px 8px",fontFamily:"'DM Mono',monospace"}}>{entry.techniqueFeel}</span>}
                  {entry.energyLevel&&<span style={{fontSize:10,background:"var(--bg2)",color:"var(--text2)",borderRadius:4,padding:"2px 8px",fontFamily:"'DM Mono',monospace"}}>{entry.energyLevel}</span>}
                  {entry.backPain&&parseInt(entry.backPain)>0&&(
                    <span style={{fontSize:10,background:"rgba(201,79,58,0.1)",color:"var(--red)",borderRadius:4,padding:"2px 8px",fontFamily:"'DM Mono',monospace"}}>
                      BACK {entry.backPain}/10
                    </span>
                  )}
                  {entry.nightShift&&<span style={{fontSize:10,background:"rgba(74,144,217,0.1)",color:"var(--blue)",borderRadius:4,padding:"2px 8px",fontFamily:"'DM Mono',monospace"}}>🌙 NIGHT SHIFT</span>}
                </div>
                {entry.focusNext&&(
                  <div style={{fontSize:11,color:"var(--purple)",fontFamily:"'DM Mono',monospace",marginBottom:6}}>
                    NEXT: {entry.focusNext}
                  </div>
                )}
                {entry.notes&&<div style={{fontSize:12,color:"var(--text2)",lineHeight:1.7}}>{entry.notes}</div>}
              </Card>
            ))}
          </div>
        )}

        {/* ═══ PRs ═══ */}
        {tab==="prs" && (
          <div className="fade">
            <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
              {[["key","KEY LIFTS"],["strength","STRENGTH"],["overhead","OVERHEAD"],["all","ALL"],["add","+ ADD PR"]].map(([id,lbl])=>(
                <Btn key={id} small ghost={prTab!==id} active={prTab===id} onClick={()=>setPrTab(id)}>{lbl}</Btn>
              ))}
            </div>

            {prTab==="key"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {KEY_PRS.map(([lift,icon])=>{
                  const pr=prs[lift];
                  return(
                    <div key={lift} style={{background:"var(--bg1)",border:"1px solid var(--border)",
                      borderLeft:"3px solid var(--gold)",borderRadius:10,padding:"14px 14px"}}>
                      <div style={{fontSize:9,color:"var(--text3)",fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:5}}>
                        {icon} {lift.toUpperCase()}
                      </div>
                      {pr?(
                        <>
                          <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"var(--gold)",lineHeight:1}}>{pr.weight}</span>
                            <span style={{fontSize:12,color:"var(--text3)"}}>kg</span>
                            {pr.reps>1&&<span style={{fontSize:12,color:"var(--text2)"}}>×{pr.reps}</span>}
                          </div>
                          <div style={{fontSize:9,color:"var(--text3)",fontFamily:"'DM Mono',monospace",marginTop:4}}>{pr.date}</div>
                        </>
                      ):(
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"var(--text3)"}}>—</div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {prTab==="strength"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {["Deadlift","RDL Pull","Snatch Deadlift","Klokov Squats","Klokov Deadlift",
                  "Good Morning","T-Bar Row","Lat Pulldown","Incline Barbell Press","Romanian Deadlift","Seated Cable Row"].map(lift=>{
                  const pr=prs[lift];
                  return(
                    <div key={lift} style={{background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:8,padding:"12px"}}>
                      <div style={{fontSize:8,color:"var(--text3)",fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:3}}>{lift.toUpperCase()}</div>
                      {pr?(
                        <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"var(--gold)"}}>{pr.weight}</span>
                          <span style={{fontSize:10,color:"var(--text3)"}}>kg</span>
                          {pr.reps>1&&<span style={{fontSize:10,color:"var(--text2)"}}>×{pr.reps}</span>}
                        </div>
                      ):<div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:"var(--text3)"}}>—</div>}
                      {pr&&<div style={{fontSize:8,color:"var(--text3)",fontFamily:"'DM Mono',monospace",marginTop:2}}>{pr.date}</div>}
                    </div>
                  );
                })}
              </div>
            )}

            {prTab==="overhead"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {["Overhead Press","Wide Overhead Press","Push Press","Behind Neck Press",
                  "Overhead Squat","Sots Press","Snatch Balance","Lunge (Barbell)"].map(lift=>{
                  const pr=prs[lift];
                  return(
                    <div key={lift} style={{background:"var(--bg1)",border:"1px solid var(--border)",
                      borderLeft:"3px solid var(--blue)",borderRadius:8,padding:"12px"}}>
                      <div style={{fontSize:8,color:"var(--text3)",fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:3}}>{lift.toUpperCase()}</div>
                      {pr?(
                        <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"var(--blue)"}}>{pr.weight}</span>
                          <span style={{fontSize:10,color:"var(--text3)"}}>kg</span>
                          {pr.reps>1&&<span style={{fontSize:10,color:"var(--text2)"}}>×{pr.reps}</span>}
                        </div>
                      ):<div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:"var(--text3)"}}>—</div>}
                      {pr&&<div style={{fontSize:8,color:"var(--text3)",fontFamily:"'DM Mono',monospace",marginTop:2}}>{pr.date}</div>}
                    </div>
                  );
                })}
              </div>
            )}

            {prTab==="all"&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(prs).sort((a,b)=>b[1].weight-a[1].weight).map(([lift,pr])=>(
                  <div key={lift} style={{background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 12px"}}>
                    <div style={{fontSize:8,color:"var(--text3)",fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:3}}>{lift.toUpperCase()}</div>
                    <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                      <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"var(--gold)"}}>{pr.weight}</span>
                      <span style={{fontSize:10,color:"var(--text3)"}}>kg</span>
                      {pr.reps>1&&<span style={{fontSize:10,color:"var(--text2)"}}>×{pr.reps}</span>}
                    </div>
                    <div style={{fontSize:8,color:"var(--text3)",fontFamily:"'DM Mono',monospace",marginTop:2}}>{pr.date}</div>
                  </div>
                ))}
              </div>
            )}

            {prTab==="add"&&(
              <Card>
                <div style={{marginBottom:12}}>
                  <label style={{fontSize:9,color:"var(--text3)",letterSpacing:2,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>LIFT</label>
                  <Sel value={newPR.lift} onChange={e=>setNewPR(p=>({...p,lift:e.target.value}))}>
                    {PR_ALL.map(l=><option key={l} value={l}>{l}</option>)}
                  </Sel>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                  <div>
                    <label style={{fontSize:9,color:"var(--text3)",letterSpacing:2,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>WEIGHT (KG)</label>
                    <Inp type="number" placeholder="0" value={newPR.weight} onChange={e=>setNewPR(p=>({...p,weight:e.target.value}))}/>
                  </div>
                  <div>
                    <label style={{fontSize:9,color:"var(--text3)",letterSpacing:2,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>REPS</label>
                    <Inp type="number" placeholder="1" value={newPR.reps} onChange={e=>setNewPR(p=>({...p,reps:e.target.value}))}/>
                  </div>
                </div>
                <Btn onClick={handleAddPR}>SAVE RECORD</Btn>
              </Card>
            )}

            {(prTab==="key"||prTab==="all")&&(
              <div style={{marginTop:16,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"12px 14px"}}>
                <div style={{fontSize:9,color:"var(--text3)",letterSpacing:1.5,fontFamily:"'DM Mono',monospace",marginBottom:6}}>
                  📊 IMPORTED FROM FITNOTES — DEC 2024 TO MAY 2026
                </div>
                <p style={{fontSize:11,color:"var(--text3)",lineHeight:1.7}}>
                  17 months of training history pre-loaded. Key gap to fill in Week 1: Jerk from Rack and Sots Press baselines need to be established and logged.
                </p>
              </div>
            )}

            {/* Data backup */}
            <div style={{marginTop:20,background:"#080f08",border:"1px solid #1a3a1a",borderRadius:8,padding:"14px"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--green)",letterSpacing:1.5,marginBottom:10}}>
                💾 DATA BACKUP
              </div>
              <p style={{fontSize:11,color:"#556",lineHeight:1.7,marginBottom:12}}>
                Export your data before any app update. Import it back after to restore everything — PRs, logs, session weights, supplement notes.
              </p>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <Btn small onClick={()=>{
                  const data = {
                    version:1,
                    exported: new Date().toISOString(),
                    oly_prs: prs,
                    oly_logs: logs,
                    oly_week: week,
                    oly_summer: isSummer,
                    oly_supp_history: suppChecked,
                    oly_supp_notes: suppNotes,
                  };
                  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement("a");
                  a.href = url;
                  a.download = `olytracker_backup_${new Date().toISOString().slice(0,10)}.json`;
                  a.click();
                  URL.revokeObjectURL(url);
                  showToast("Data exported ✓");
                }} style={{background:"var(--green)",color:"#000"}}>⬇ EXPORT DATA</Btn>

                <label style={{
                  background:"transparent",color:"var(--text2)",border:"1px solid var(--border2)",
                  borderRadius:5,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:600,
                  letterSpacing:0.5,padding:"6px 14px",fontSize:11,display:"inline-block",
                }}>
                  ⬆ IMPORT DATA
                  <input type="file" accept=".json" style={{display:"none"}} onChange={async e=>{
                    const file = e.target.files[0];
                    if(!file) return;
                    try {
                      const text = await file.text();
                      const data = JSON.parse(text);
                      if(data.version !== 1) { showToast("❌ Invalid backup file"); return; }
                      if(data.oly_prs) { setPrs(data.oly_prs); await storage.set("oly_prs",JSON.stringify(data.oly_prs)); }
                      if(data.oly_logs) { setLogs(data.oly_logs); await storage.set("oly_logs",JSON.stringify(data.oly_logs)); }
                      if(data.oly_week) { setWeek(data.oly_week); await storage.set("oly_week",JSON.stringify(data.oly_week)); }
                      if(data.oly_summer !== undefined) { setIsSummer(data.oly_summer); await storage.set("oly_summer",JSON.stringify(data.oly_summer)); }
                      if(data.oly_supp_history) { setSuppHistory(data.oly_supp_history); await storage.set("oly_supp_history",JSON.stringify(data.oly_supp_history)); }
                      if(data.oly_supp_notes !== undefined) { setSuppNotes(data.oly_supp_notes); await storage.set("oly_supp_notes",data.oly_supp_notes); }
                      showToast("✓ Data restored successfully");
                      e.target.value = "";
                    } catch(err) {
                      showToast("❌ Failed to import — invalid file");
                    }
                  }}/>
                </label>
              </div>

              {/* GitHub Sync */}
              <div style={{marginTop:12,background:"#0a0a1a",border:`1px solid ${gistCfg.id?"#2a4a6a":"#2a2a4a"}`,borderRadius:8,padding:"14px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--blue)",letterSpacing:1.5}}>
                    🔄 GITHUB SYNC
                  </div>
                  {gistCfg.id&&(
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:syncStatus==="ok"?"var(--green)":syncStatus==="syncing"?"var(--gold)":syncStatus==="error"?"var(--red)":"var(--border2)"}}/>
                      <span style={{fontSize:9,color:"var(--text3)",fontFamily:"'DM Mono',monospace"}}>
                        {syncStatus==="syncing"?"SYNCING…":syncStatus==="ok"?`SYNCED ${gistCfg.lastSync?new Date(gistCfg.lastSync).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):""}`:syncStatus==="error"?"SYNC ERROR":"IDLE"}
                      </span>
                    </div>
                  )}
                </div>
                {!gistCfg.id?(
                  <>
                    <p style={{fontSize:11,color:"var(--text2)",lineHeight:1.7,marginBottom:8}}>
                      Sync PRs and logs between PC and phone via a private GitHub Gist. Enter a token with <b style={{color:"var(--text)"}}>gist</b> scope.
                    </p>
                    <p style={{fontSize:10,color:"var(--text3)",lineHeight:1.6,marginBottom:10}}>
                      github.com → Settings → Developer settings → Personal access tokens → Tokens (classic) → New → check "gist" → Generate
                    </p>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <input value={gistToken} onChange={e=>setGistToken(e.target.value)}
                        placeholder="ghp_your_token_here"
                        style={{flex:1,background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:5,
                          color:"var(--text)",padding:"7px 10px",fontSize:11,fontFamily:"'DM Mono',monospace"}}/>
                      <Btn small onClick={connectGist} style={{background:"var(--blue)",color:"#fff",flexShrink:0}}>
                        {syncStatus==="syncing"?"…":"CONNECT"}
                      </Btn>
                    </div>
                  </>
                ):(
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <Btn small onClick={async()=>{
                      setSyncStatus("syncing");
                      try{
                        const cfg=JSON.parse(localStorage.getItem("oly_gist"));
                        const setsData={};Object.keys(localStorage).filter(k=>k.startsWith("sets_")).forEach(k=>{setsData[k]=localStorage.getItem(k);});
                        const data={version:1,oly_prs:prs,oly_logs:logs,oly_week:week,oly_summer:isSummer,oly_supp_history:suppHistory,oly_supp_notes:suppNotes,sets:setsData};
                        await gist.write(cfg.token,cfg.id,data);
                        const updated={...cfg,lastSync:new Date().toISOString()};
                        setGistCfg(updated);localStorage.setItem("oly_gist",JSON.stringify(updated));
                        setSyncStatus("ok");showToast("✓ Pushed to GitHub");
                      }catch{setSyncStatus("error");showToast("❌ Push failed");}
                    }} style={{background:"var(--blue)",color:"#fff"}}>↑ PUSH NOW</Btn>
                    <Btn small onClick={async()=>{
                      setSyncStatus("syncing");
                      try{
                        const cfg=JSON.parse(localStorage.getItem("oly_gist"));
                        const remote=await gist.read(cfg.token,cfg.id);
                        if(remote.version===1) await applyRemoteData(remote);
                        const updated={...cfg,lastSync:new Date().toISOString()};
                        setGistCfg(updated);localStorage.setItem("oly_gist",JSON.stringify(updated));
                        setSyncStatus("ok");showToast("✓ Pulled from GitHub");
                      }catch{setSyncStatus("error");showToast("❌ Pull failed");}
                    }}>↓ PULL NOW</Btn>
                    <Btn small ghost onClick={()=>{
                      setGistCfg({token:"",id:"",lastSync:null});
                      localStorage.removeItem("oly_gist");
                      setSyncStatus("idle");
                      showToast("Sync disconnected");
                    }}>DISCONNECT</Btn>
                  </div>
                )}
              </div>

              {/* LM Studio settings */}
              <div style={{marginTop:12,background:"#0a0a1a",border:"1px solid #2a2a4a",borderRadius:8,padding:"14px"}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--gold)",letterSpacing:1.5,marginBottom:8}}>
                  ⚡ CLAUDE API (AI REVIEW)
                </div>
                <p style={{fontSize:10,color:"var(--text3)",lineHeight:1.6,marginBottom:10}}>
                  Weekly review is analyzed by Claude Sonnet. Paste your Anthropic API key below — it's stored locally in your browser only.
                </p>
                <LmSettingsPanel />
              </div>

            </div>
          </div>
        )}

        {/* ═══ REPORTS ═══ */}
        {tab==="reports" && <Reports prs={prs} logs={logs} week={week}/>}

        {/* ═══ SYSTEM ═══ */}
        {tab==="system" && <SystemTab week={week}/>}

      </div>

    {/* ═══ LOG MODAL ═══ */}
    {logModal && (
      <div onClick={e=>{if(e.target===e.currentTarget)setLogModal(false);}}
        style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,overflowY:"auto",padding:"20px 16px 40px"}}>
        <div style={{maxWidth:480,margin:"0 auto",background:"var(--bg1)",borderRadius:12,
          border:"1px solid var(--border)",padding:"20px 16px"}}>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:0.5,color:"var(--gold)"}}>
              {logEditKey ? "EDIT SESSION" : "COMPLETE SESSION"}
            </div>
            <button onClick={()=>setLogModal(false)}
              style={{background:"transparent",border:"none",color:"var(--text3)",fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
          </div>

          {/* Date */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:9,color:"var(--text3)",letterSpacing:2,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>DATE</label>
            <Inp type="date" value={logForm.date} onChange={e=>setLogForm(f=>({...f,date:e.target.value}))} style={{colorScheme:"dark"}}/>
          </div>

          {/* Session */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:9,color:"var(--text3)",letterSpacing:2,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>SESSION</label>
            <Sel value={logForm.dayId} onChange={e=>setLogForm(f=>({...f,dayId:e.target.value}))}>
              {DAYS.map(d=><option key={d.id} value={d.id}>{d.label} — {d.schedule} — {d.name}</option>)}
            </Sel>
          </div>

          {/* Weights */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:9,color:"var(--text3)",letterSpacing:2,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>WEIGHTS USED</label>
            <Inp placeholder="e.g. BS single: 112kg · OHS: 45kg"
              value={logForm.weights} onChange={e=>setLogForm(f=>({...f,weights:e.target.value}))}/>
          </div>

          {/* Post-training review */}
          <div style={{fontSize:9,color:"var(--text2)",letterSpacing:2,fontFamily:"'DM Mono',monospace",marginBottom:8,marginTop:4}}>POST-TRAINING REVIEW</div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div>
              <label style={{fontSize:9,color:"var(--text3)",letterSpacing:1.5,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>TECHNIQUE FEEL</label>
              <Sel value={logForm.techniqueFeel} onChange={e=>setLogForm(f=>({...f,techniqueFeel:e.target.value}))}>
                <option value="">— select</option>
                <option value="Clicked">✅ Clicked</option>
                <option value="Decent">👍 Decent</option>
                <option value="Inconsistent">⚠️ Inconsistent</option>
                <option value="Off today">❌ Off today</option>
              </Sel>
            </div>
            <div>
              <label style={{fontSize:9,color:"var(--text3)",letterSpacing:1.5,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>ENERGY LEVEL</label>
              <Sel value={logForm.energyLevel} onChange={e=>setLogForm(f=>({...f,energyLevel:e.target.value}))}>
                <option value="">— select</option>
                <option value="High">🔥 High</option>
                <option value="Normal">💪 Normal</option>
                <option value="Low">😴 Low</option>
                <option value="Post-shift">🌙 Post-shift</option>
              </Sel>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div>
              <label style={{fontSize:9,color:"var(--text3)",letterSpacing:1.5,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>BACK PAIN (0–10)</label>
              <Inp type="number" min="0" max="10" placeholder="0"
                value={logForm.backPain} onChange={e=>setLogForm(f=>({...f,backPain:e.target.value}))}/>
            </div>
            <div>
              <label style={{fontSize:9,color:"var(--text3)",letterSpacing:1.5,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>POST NIGHT SHIFT?</label>
              <Sel value={logForm.nightShift} onChange={e=>setLogForm(f=>({...f,nightShift:e.target.value==="true"}))}>
                <option value="false">No</option>
                <option value="true">Yes — 5.5h sleep</option>
              </Sel>
            </div>
          </div>

          <div style={{marginBottom:12}}>
            <label style={{fontSize:9,color:"var(--text3)",letterSpacing:1.5,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>FOCUS NEXT SESSION</label>
            <Sel value={logForm.focusNext} onChange={e=>setLogForm(f=>({...f,focusNext:e.target.value}))}>
              <option value="">— select</option>
              <option value="Nothing — felt good">✅ Nothing — felt good</option>
              <option value="Bar path">📐 Bar path</option>
              <option value="Hip position">🦵 Hip position</option>
              <option value="Receiving position">📥 Receiving position</option>
              <option value="Jerk dip">⬇️ Jerk dip</option>
              <option value="Overhead lockout">🔒 Overhead lockout</option>
              <option value="First pull off floor">🏋️ First pull off floor</option>
              <option value="Footwork">👣 Footwork</option>
              <option value="OHS depth">📐 OHS depth</option>
            </Sel>
          </div>

          {/* Rating */}
          <div style={{marginBottom:14}}>
            <label style={{fontSize:9,color:"var(--text3)",letterSpacing:1.5,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:8}}>SESSION RATING</label>
            <div style={{display:"flex",gap:8}}>
              {[1,2,3,4,5].map(n=>{
                const stars="⭐".repeat(n);
                return(
                  <button key={n} onClick={()=>setLogForm(f=>({...f,rating:stars}))} style={{
                    flex:1,padding:"8px 4px",borderRadius:5,cursor:"pointer",fontSize:12,border:"none",
                    background:logForm.rating===stars?"var(--gold)":"var(--bg2)",
                    color:logForm.rating===stars?"#000":"var(--text3)",
                  }}>{n}</button>
                );
              })}
            </div>
          </div>

          {/* Notes */}
          <div style={{marginBottom:16}}>
            <label style={{fontSize:9,color:"var(--text3)",letterSpacing:1.5,fontFamily:"'DM Mono',monospace",display:"block",marginBottom:6}}>NOTES</label>
            <Tex placeholder="Cues, observations, PR attempts…"
              value={logForm.notes} onChange={e=>setLogForm(f=>({...f,notes:e.target.value}))}/>
          </div>

          <Btn onClick={handleLog}>LOG SESSION</Btn>
        </div>
      </div>
    )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<OlyTracker/>);
</script>
</body>
</html>
