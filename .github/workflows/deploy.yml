name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API keys
        run: |
          CLEAN_CLAUDE=$(echo "$ANTHROPIC_API_KEY" | tr -d '\r\n')
          CLEAN_SB_URL=$(echo "$SUPABASE_URL" | tr -d '\r\n')
          CLEAN_SB_KEY=$(echo "$SUPABASE_ANON_KEY" | tr -d '\r\n')
          printf 'window.__CLAUDE_KEY="%s";\n' "$CLEAN_CLAUDE" > docs/key.js
          if [ -n "$CLEAN_SB_URL" ]; then printf 'window.__SUPABASE_URL="%s";\n' "$CLEAN_SB_URL" >> docs/key.js; fi
          if [ -n "$CLEAN_SB_KEY" ]; then printf 'window.__SUPABASE_KEY="%s";\n' "$CLEAN_SB_KEY" >> docs/key.js; fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - uses: actions/deploy-pages@v4
        id: deployment
