// Reference frames for each exercise — used to show Claude elite technique
function getRefFrames(exercise) {
  if (exercise === 'snatch')    return REFERENCE_FRAMES.snatch;
  // C&J reference uses squat jerk — only the clean portion (frames 0-3) is applicable
  if (exercise === 'clean_jerk' || exercise === 'clean') return REFERENCE_FRAMES.clean_jerk.slice(0, 4);
  return null;
}

// ── CV Utilities ───────────────────────────────────────────────────────────────

const FRAME_COUNT = 8;
const MAX_HEIGHT  = 720;

function seekTo(video, time) {
  return new Promise(resolve => {
    video.addEventListener('seeked', () => setTimeout(resolve, 100), { once: true });
    video.currentTime = time;
  });
}

function videoToCanvas(video) {
  const scale = Math.min(1, MAX_HEIGHT / video.videoHeight);
  const w = Math.round(video.videoWidth * scale);
  const h = Math.round(video.videoHeight * scale);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(video, 0, 0, w, h);
  return canvas;
}

async function extractFrames(videoEl) {
  const duration = videoEl.duration;
  if (!duration || duration < 2) throw new Error('Video must be at least 2 seconds long.');
  // Prime the video decoder — some browsers don't decode frames until playback starts
  try {
    await videoEl.play();
    await new Promise(r => setTimeout(r, 80));
    videoEl.pause();
  } catch (_) {}
  const frames = [];
  for (let i = 0; i < FRAME_COUNT; i++) {
    const t = i === FRAME_COUNT - 1
      ? Math.max(0, duration - 0.1)
      : (i / (FRAME_COUNT - 1)) * duration;
    await seekTo(videoEl, t);
    const canvas = videoToCanvas(videoEl);
    frames.push({ index: i, timestamp: parseFloat(t.toFixed(2)), canvas });
  }
  return frames;
}

// ── MediaPipe Pose ─────────────────────────────────────────────────────────────

const LM = {
  LEFT_SHOULDER:11, RIGHT_SHOULDER:12,
  LEFT_ELBOW:13,    RIGHT_ELBOW:14,
  LEFT_WRIST:15,    RIGHT_WRIST:16,
  LEFT_HIP:23,      RIGHT_HIP:24,
  LEFT_KNEE:25,     RIGHT_KNEE:26,
  LEFT_ANKLE:27,    RIGHT_ANKLE:28,
};

const POSE_CONNECTIONS = [
  [11,12],[11,13],[13,15],[12,14],[14,16],
  [11,23],[12,24],[23,24],
  [23,25],[25,27],[24,26],[26,28],
];

let poseInstance = null;

async function getPose() {
  if (poseInstance) return poseInstance;
  const pose = new window.Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/${file}`
  });
  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: false,
    enableSegmentation: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });
  await pose.initialize();
  poseInstance = pose;
  return pose;
}

function runPoseOnCanvas(pose, canvas) {
  return new Promise((resolve) => {
    const timer = setTimeout(() => resolve(null), 20000);
    pose.onResults((results) => {
      clearTimeout(timer);
      resolve(results.poseLandmarks || null);
    });
    const p = pose.send({ image: canvas });
    if (p && typeof p.catch === 'function') {
      p.catch(() => { clearTimeout(timer); resolve(null); });
    }
  });
}

function angleBetween(a, b, c) {
  if (!a || !b || !c) return null;
  const ba = { x: a.x - b.x, y: a.y - b.y };
  const bc = { x: c.x - b.x, y: c.y - b.y };
  const dot = ba.x * bc.x + ba.y * bc.y;
  const mag = Math.sqrt(ba.x**2 + ba.y**2) * Math.sqrt(bc.x**2 + bc.y**2);
  if (mag === 0) return null;
  return Math.round(Math.acos(Math.min(1, Math.max(-1, dot / mag))) * 180 / Math.PI);
}

function computeAngles(lm) {
  if (!lm) return {};
  return {
    left_knee:   angleBetween(lm[LM.LEFT_HIP],       lm[LM.LEFT_KNEE],   lm[LM.LEFT_ANKLE]),
    right_knee:  angleBetween(lm[LM.RIGHT_HIP],      lm[LM.RIGHT_KNEE],  lm[LM.RIGHT_ANKLE]),
    left_hip:    angleBetween(lm[LM.LEFT_SHOULDER],  lm[LM.LEFT_HIP],    lm[LM.LEFT_KNEE]),
    right_hip:   angleBetween(lm[LM.RIGHT_SHOULDER], lm[LM.RIGHT_HIP],   lm[LM.RIGHT_KNEE]),
    left_elbow:  angleBetween(lm[LM.LEFT_SHOULDER],  lm[LM.LEFT_ELBOW],  lm[LM.LEFT_WRIST]),
    right_elbow: angleBetween(lm[LM.RIGHT_SHOULDER], lm[LM.RIGHT_ELBOW], lm[LM.RIGHT_WRIST]),
  };
}

function barCentroid(lm) {
  if (!lm) return null;
  const lw = lm[LM.LEFT_WRIST], rw = lm[LM.RIGHT_WRIST];
  if (!lw || !rw) return null;
  return { x: (lw.x + rw.x) / 2, y: (lw.y + rw.y) / 2 };
}

async function runPoseOnFrames(frames, onProgress) {
  let pose = null;
  try {
    onProgress('Loading pose model…');
    pose = await Promise.race([
      getPose(),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 15000))
    ]);
  } catch (_) {
    // MediaPipe failed to load or timed out — proceed without pose data
  }
  const results = [];
  for (const frame of frames) {
    onProgress(`Pose detection: frame ${frame.index + 1}/${frames.length}…`);
    let landmarks = null;
    if (pose) {
      try { landmarks = await runPoseOnCanvas(pose, frame.canvas); } catch (_) {}
    }
    const angles   = computeAngles(landmarks);
    const centroid = barCentroid(landmarks);
    results.push({ ...frame, landmarks, angles, centroid });
  }
  return results;
}

// ── Frame Annotation ───────────────────────────────────────────────────────────

function drawSkeleton(ctx, landmarks, w, h) {
  if (!landmarks) return;
  ctx.lineWidth = 2;
  POSE_CONNECTIONS.forEach(([a, b]) => {
    const pa = landmarks[a], pb = landmarks[b];
    if (!pa || !pb) return;
    const vis = Math.min(pa.visibility ?? 1, pb.visibility ?? 1);
    ctx.strokeStyle = vis > 0.7 ? 'rgba(90,158,69,0.85)'
                    : vis > 0.4 ? 'rgba(212,168,67,0.7)'
                    : 'rgba(100,100,100,0.5)';
    ctx.beginPath();
    ctx.moveTo(pa.x * w, pa.y * h);
    ctx.lineTo(pb.x * w, pb.y * h);
    ctx.stroke();
  });
  Object.values(LM).forEach(idx => {
    const lm = landmarks[idx];
    if (!lm) return;
    const vis = lm.visibility ?? 1;
    ctx.fillStyle = vis > 0.7 ? 'rgba(90,158,69,0.9)'
                  : vis > 0.4 ? 'rgba(212,168,67,0.8)'
                  : 'rgba(100,100,100,0.6)';
    ctx.beginPath();
    ctx.arc(lm.x * w, lm.y * h, 3, 0, Math.PI * 2);
    ctx.fill();
  });
}

function annotateFrames(poseFrames) {
  const centroids = poseFrames.map(f => f.centroid);
  return poseFrames.map((frame, i) => {
    const { canvas, landmarks } = frame;
    const w = canvas.width, h = canvas.height;
    const out = document.createElement('canvas');
    out.width = w; out.height = h;
    const ctx = out.getContext('2d');
    ctx.drawImage(canvas, 0, 0);
    ctx.strokeStyle = '#4a90d9';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    let started = false;
    for (let j = 0; j <= i; j++) {
      const c = centroids[j];
      if (!c) continue;
      if (!started) { ctx.moveTo(c.x * w, c.y * h); started = true; }
      else ctx.lineTo(c.x * w, c.y * h);
    }
    if (started) ctx.stroke();
    if (centroids[i]) {
      ctx.fillStyle = '#4a90d9';
      ctx.beginPath();
      ctx.arc(centroids[i].x * w, centroids[i].y * h, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    drawSkeleton(ctx, landmarks, w, h);
    return { ...frame, annotatedCanvas: out, b64: out.toDataURL('image/jpeg', 0.82) };
  });
}

COACHING:
Write 2-4 sentences. Be specific and actionable. Reference actual angles or bar path data where relevant. Prioritise the most impactful correction. Mention back pain implications if relevant.`;
}

async function callClaude(apiKey, exercise, annotatedFrames, poseFrames) {
  const refFrames = getRefFrames(exercise);
  const refCount  = refFrames ? refFrames.length : 0;
  const prompt = buildPrompt(exercise, annotatedFrames, poseFrames, refCount);

  const refBlocks = refFrames ? [
    { type: 'text', text: 'REFERENCE FRAMES — elite technique example (compare to athlete below):' },
    ...refFrames.map(f => ({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: f.b64 } }))
  ] : [];
  const imageBlocks = annotatedFrames.map(f => ({
    type: 'image',
    source: { type: 'base64', media_type: 'image/jpeg', data: f.b64.split(',')[1] }
  }));

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'content-type': 'application/json',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 4096,
      messages: [{
        role: 'user',
        content: [...refBlocks, { type: 'text', text: 'ATHLETE FRAMES — analyze these:' }, ...imageBlocks, { type: 'text', text: prompt }]
      }]
    })
  });

  if (!response.ok) {
    let msg = `HTTP ${response.status}`;
    try {
      const body = await response.text();
      try { msg = JSON.parse(body)?.error?.message || body.slice(0, 200); }
      catch { msg = body.slice(0, 200) || msg; }
    } catch {}
    throw new Error(`Claude API error: ${msg}`);
  }

  const data = await response.json();
  const text = data.content?.[0]?.text || '';
  return parseClaudeResponse(text);
}

function parseClaudeResponse(text) {
  const jsonMatch = text.match(/```json\r?\n([\s\S]*?)\r?\n?```/);
  if (!jsonMatch) {
    return { raw: text, structured: null, coaching: text };
  }
  let structured;
  try {
    structured = JSON.parse(jsonMatch[1].trim());
  } catch {
    return { raw: text, structured: null, coaching: text };
  }
  const coachingMatch = text.match(/COACHING:\n([\s\S]*?)$/);
  const coaching = coachingMatch ? coachingMatch[1].trim() : '';
  return { raw: text, structured, coaching };
}

function UploadZone({ onFrames, onError }) {
  const [dragging, setDragging]   = useState(false);
  const [fileName, setFileName]   = useState('');
  const [preview, setPreview]     = useState(null);
  const [loading, setLoading]     = useState(false);
  const fileRef = useRef(null);
  const videoRef = useRef(null);

  useEffect(() => {
    return () => { if (preview) URL.revokeObjectURL(preview); };
  }, [preview]);

  const handleFile = useCallback(async (file) => {
    if (!file || !file.type.startsWith('video/')) {
      onError('Please select an MP4, MOV, or WebM video file.');
      return;
    }
    setFileName(file.name);
    const url = URL.createObjectURL(file);
    setPreview(url);
  }, [onError]);

  const handleVideoLoaded = useCallback(async () => {
    const video = videoRef.current;
    if (!video) return;
    if (video.duration < 2) {
      onError('Video must be at least 2 seconds long.');
      return;
    }
    setLoading(true);
    try {
      const frames = await extractFrames(video);
      onFrames(frames, video);
    } catch (err) {
      onError(err.message);
    } finally {
      setLoading(false);
    }
  }, [onFrames, onError]);

  const onDrop = useCallback((e) => {
    e.preventDefault(); setDragging(false);
    handleFile(e.dataTransfer.files[0]);
  }, [handleFile]);

  return (
    <div style={{marginTop:24}}>
      <div style={{fontSize:11,color:'var(--text2)',letterSpacing:1,marginBottom:8}}>VIDEO</div>

      {preview && (
        <video
          ref={videoRef}
          src={preview}
          onLoadedMetadata={handleVideoLoaded}
          style={{position:'fixed',left:'-9999px',width:'1px',height:'1px',opacity:0,pointerEvents:'none'}}
          muted
          playsInline
        />
      )}

      <div
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={onDrop}
        onClick={() => !preview && fileRef.current?.click()}
        style={{
          border:`1px dashed ${dragging ? 'var(--gold)' : 'var(--border2)'}`,
          borderRadius:6,padding:'24px 16px',textAlign:'center',
          cursor: preview ? 'default' : 'pointer',
          background: dragging ? 'rgba(212,168,67,0.05)' : 'var(--bg2)',
          transition:'all 0.15s'
        }}
      >
        {loading ? (
          <div style={{color:'var(--text2)',fontSize:13}}>Extracting frames…</div>
        ) : fileName ? (
          <div>
            <div style={{color:'var(--text)',fontSize:13,marginBottom:4}}>{fileName}</div>
            <div
              onClick={e => { e.stopPropagation(); setFileName(''); setPreview(null); onFrames(null); }}
              style={{color:'var(--text3)',fontSize:11,cursor:'pointer',textDecoration:'underline'}}
            >
              Remove
            </div>
          </div>
        ) : (
          <div style={{color:'var(--text3)',fontSize:13}}>
            Drop video here or <span style={{color:'var(--gold)'}}>browse</span>
          </div>
        )}
      </div>
      <input ref={fileRef} type="file" accept="video/*" style={{display:'none'}}
        onChange={e => handleFile(e.target.files[0])} />
    </div>
  );
}

function FrameLightbox({ annotatedFrames, phases, framePhases, startIndex, onClose }) {
  const [idx, setIdx] = useState(startIndex);
  const canvasRef = useRef(null);

  useEffect(() => {
    const el = canvasRef.current;
    const frame = annotatedFrames[idx];
    if (!el || !frame) return;
    el.width  = frame.annotatedCanvas.width;
    el.height = frame.annotatedCanvas.height;
    el.getContext('2d').drawImage(frame.annotatedCanvas, 0, 0);
  }, [idx, annotatedFrames]);

  useEffect(() => {
    const onKey = e => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight') setIdx(i => Math.min(i + 1, annotatedFrames.length - 1));
      if (e.key === 'ArrowLeft')  setIdx(i => Math.max(i - 1, 0));
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [annotatedFrames.length, onClose]);

  const frame = annotatedFrames[idx];
  return (
    <div
      onClick={onClose}
      style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.92)',zIndex:200,
        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}

  }).sort((a,b) => (order[a.status]||2)-(order[b.status]||2));

  const cuesHtml = mergedCues.map(c => `
    <div style="display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #1c1c1c">
      <span style="color:${statusColor[c.status]};font-size:15px;flex-shrink:0">${statusIcon[c.status]}</span>
      <div style="flex:1">
        <div style="font-size:13px;color:#e2e2e2">${c.cue}</div>
        ${c.note ? `<div style="font-size:11px;color:#888;margin-top:2px">${c.note}</div>` : ''}
      </div>
      <span style="font-size:10px;color:#444;flex-shrink:0">${c.source}</span>
    </div>`).join('');

  const flagsHtml = (structured?.body_flags||[]).length === 0
    ? '<div style="font-size:12px;color:#555">No flags</div>'
    : (structured?.body_flags||[]).map(f => `
      <div style="margin-bottom:8px">
        <span style="color:${f.status==='fail'?'#c94f3a':'#d4a843'};font-size:12px;font-weight:600">● ${f.segment.replace(/_/g,' ')}</span>
        <div style="font-size:11px;color:#888;margin-top:2px">${f.note}</div>
      </div>`).join('');

  const html = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<title>Lift Review — ${label} — ${date}</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0a;color:#e2e2e2;font-family:'Segoe UI',system-ui,sans-serif;padding:24px}
h1{font-size:26px;letter-spacing:2px;color:#d4a843;margin-bottom:4px}
.sub{font-size:12px;color:#555;margin-bottom:28px}
.section{background:#111;border:1px solid #222;border-radius:6px;padding:16px;margin-bottom:16px}
.label{font-size:10px;color:#666;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase}
.coaching{font-size:14px;line-height:1.7;color:#e2e2e2}
.phases{display:flex;gap:4px;flex-wrap:wrap}
.frames{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.bar-note{font-size:10px;color:#4a90d9;margin-top:6px}
</style></head><body>
<h1>LIFT REVIEW</h1>
<div class="sub">${label} · ${date}</div>
<div class="section"><div class="label">AI Coaching</div><div class="coaching">${coaching||''}</div></div>
<div class="section"><div class="label">Lift Phases</div><div class="phases">${phasesHtml}</div></div>
<div class="section"><div class="label">Key Frames — skeleton + bar path</div><div class="frames">${framesHtml}</div><div class="bar-note">— blue line = bar path</div></div>
<div class="section"><div class="label">Cue Checklist</div>${cuesHtml}</div>
<div class="section"><div class="label">Body Flags</div>${flagsHtml}</div>
</body></html>`;

  const slug = label.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  const dateSlug = new Date().toISOString().slice(0,10);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], {type:'text/html'}));
  a.download = `lift-review-${slug}-${dateSlug}.html`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 10000);
}

function Results({ exercise, annotatedFrames, poseFrames, claudeResult }) {
  if (!claudeResult) return null;
  const { structured, coaching, raw } = claudeResult;
  const phases = PHASES[exercise] || [];
  const cues   = CUES[exercise]  || [];

  const poseUnavailable = !annotatedFrames?.some(f => f.landmarks);

  if (!structured) {
    return (
      <div style={{marginTop:24,padding:16,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:6}}>
        <div style={{fontSize:12,color:'var(--red)',marginBottom:8}}>Could not parse structured response. Raw output:</div>
        <pre style={{fontSize:11,color:'var(--text2)',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{raw}</pre>
      </div>
    );
  }

  return (
    <div className="fade" style={{marginTop:24}}>
      {poseUnavailable && (
        <div style={{
          marginBottom:12,padding:'8px 12px',
          background:'rgba(74,144,217,0.08)',border:'1px solid rgba(74,144,217,0.25)',
          borderRadius:4,fontSize:12,color:'var(--text2)'
        }}>
          Pose detection unavailable — analysis based on visual frames only.
        </div>
      )}
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
        <button
          onClick={() => saveReport(exercise, annotatedFrames, claudeResult)}
          style={{background:'none',border:'1px solid var(--border2)',borderRadius:4,
            padding:'7px 14px',color:'var(--text2)',cursor:'pointer',fontSize:12,
            display:'flex',alignItems:'center',gap:6}}
          onMouseEnter={e => e.currentTarget.style.borderColor='var(--gold)'}
          onMouseLeave={e => e.currentTarget.style.borderColor='var(--border2)'}
        >
          ↓ SAVE REPORT
        </button>
      </div>
      <CoachingText text={coaching} />
      <PhaseTimeline phases={phases} phaseData={structured.phases} />
      <ReferenceFramesStrip exercise={exercise} />
      <KeyFramesStrip annotatedFrames={annotatedFrames} phases={phases} framePhases={structured.frame_phases} />
      <CueChecklist cues={cues} cueData={structured.cues} />
      <BodyDiagram bodyFlags={structured.body_flags} />
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [showSettings, setShowSettings] = useState(false);
  const [exercise,     setExercise]     = useState('snatch');
  const [apiKey,       setApiKey]       = useState(() => localStorage.getItem('lr_api_key') || '');
  const [frames,       setFrames]       = useState(null);
  const [error,        setError]        = useState('');
  const [loading,      setLoading]      = useState(false);
  const [loadingMsg,   setLoadingMsg]   = useState('');
  const [annotated,    setAnnotated]    = useState(null);
  const [poseFrames,   setPoseFrames]   = useState(null);
  const [result,       setResult]       = useState(null);

  const canAnalyze = !!frames && !!apiKey && !loading;

  const handleFrames = useCallback((frms, vid) => {
    setFrames(frms || null);
    setAnnotated(null);
    setPoseFrames(null);
    setResult(null);
    setError('');
  }, []);

  const handleSettingsClose = useCallback(() => {
    setShowSettings(false);
    setApiKey(localStorage.getItem('lr_api_key') || '');
  }, []);

  const analyze = useCallback(async () => {
    if (!frames || !apiKey) return;
    setError('');
    setResult(null);
    setLoading(true);
    try {
      setLoadingMsg('Running pose detection…');
      const pf = await runPoseOnFrames(frames, msg => setLoadingMsg(msg));

      setLoadingMsg('Annotating frames…');
      const af = annotateFrames(pf);

      setLoadingMsg('Sending to Claude…');
      const claudeResult = await callClaude(apiKey, exercise, af, pf);

      setPoseFrames(pf);
      setAnnotated(af);
      setResult(claudeResult);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
      setLoadingMsg('');
    }
  }, [frames, apiKey, exercise]);

  return (
    <div style={{maxWidth:640,margin:'0 auto',padding:'0 16px 60px'}}>
      {/* Header */}
      <div style={{
        display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'20px 0 16px',borderBottom:'1px solid var(--border)'
      }}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:28,letterSpacing:2,color:'var(--gold)'}}>
          LIFT REVIEW
        </div>
        <button onClick={() => setShowSettings(true)} style={{
          background:'none',border:'1px solid var(--border2)',borderRadius:4,
          padding:'6px 12px',color: apiKey ? 'var(--green)' : 'var(--text2)',cursor:'pointer',fontSize:12
        }}>
          {apiKey ? '⚙ API KEY SET' : '⚙ ADD API KEY'}
        </button>
      </div>

      {/* Exercise selector */}
      <div style={{marginTop:20}}>
        <div style={{fontSize:11,color:'var(--text2)',letterSpacing:1,marginBottom:6}}>EXERCISE</div>
        <select
          value={exercise}
          onChange={e => { setExercise(e.target.value); setResult(null); }}
          style={{
            width:'100%',background:'var(--bg2)',border:'1px solid var(--border2)',
            borderRadius:4,padding:'10px 12px',color:'var(--text)',fontSize:14
          }}
        >
          {EXERCISES.map(ex => <option key={ex.id} value={ex.id}>{ex.label}</option>)}
        </select>
      </div>

      {/* Upload zone */}
      <UploadZone onFrames={handleFrames} onError={setError} />

      {/* Error */}
      {error && (
        <div style={{
          marginTop:12,padding:'10px 14px',
          background:'rgba(201,79,58,0.1)',border:'1px solid var(--red)',
          borderRadius:4,color:'var(--red)',fontSize:13,display:'flex',
          alignItems:'flex-start',gap:8
        }}>
          <span style={{flex:1}}>{error}</span>
          <button onClick={() => setError('')} style={{
            background:'none',border:'none',color:'var(--red)',
            cursor:'pointer',fontSize:16,lineHeight:1,flexShrink:0
          }}>×</button>
        </div>
      )}

      {/* Analyze button */}
      {frames && (
        <div style={{marginTop:20}}>
          {!apiKey && (
            <div style={{fontSize:12,color:'var(--text3)',marginBottom:8,textAlign:'center'}}>
              Add your Anthropic API key in settings to enable analysis
            </div>
          )}
          <Btn
            onClick={analyze}
            disabled={!canAnalyze}
            style={{width:'100%',fontSize:18,padding:'12px 0'}}
          >
            {loading ? loadingMsg || 'ANALYZING…' : 'ANALYZE TECHNIQUE'}
          </Btn>
          {loading && (
            <div style={{
              marginTop:8,height:2,background:'var(--border)',borderRadius:1,overflow:'hidden'
            }}>
              <div style={{
                height:'100%',background:'var(--gold)',
                animation:'progress 2s ease-in-out infinite',
                width:'40%'
              }}/>
            </div>
          )}
        </div>
      )}

      {/* Results */}
      {result && annotated && poseFrames && (
        <Results
          exercise={exercise}
          annotatedFrames={annotated}
          poseFrames={poseFrames}
          claudeResult={result}
        />
      )}

      {showSettings && <SettingsModal onClose={handleSettingsClose} />}

      <style>{`
        @keyframes progress {
          0%{transform:translateX(-100%)}
          50%{transform:translateX(250%)}
          100%{transform:translateX(-100%)}
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
